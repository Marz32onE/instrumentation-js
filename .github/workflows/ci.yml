name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/*.js'
      - 'packages/**/*.mjs'
      - 'packages/**/*.cjs'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.*'
      - 'tsconfig*.json'
      - 'Makefile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/*.js'
      - 'packages/**/*.mjs'
      - 'packages/**/*.cjs'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.*'
      - 'tsconfig*.json'
      - 'Makefile'
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: make install

      - run: make lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install nats-server
        run: |
          curl -sf https://binaries.nats.dev/nats-io/nats-server/v2@latest | sh
          sudo mv ./nats-server /usr/local/bin/nats-server

      - run: make install

      - run: make test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: make install

      - run: make build
